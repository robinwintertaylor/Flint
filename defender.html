<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defender Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: black; display: block; margin: auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game variables
        let player = { x: canvas.width / 2, y: canvas.height / 2, width: 50, height: 30, speed: 5 };
        let bullets = [];
        let enemies = [];
        let score = 0;

        // Key listeners
        let keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Update game state
        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;
            if (keys['Space'] && bullets.length < 10) {
                bullets.push({ x: player.x + player.width / 2, y: player.y, width: 5, height: 10 });
            }

            // Move bullets
            bullets.forEach((bullet, index) => {
                bullet.y -= 10;
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            // TODO: Update enemies and collision detection
        }

        // Draw game elements
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw player
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Draw bullets
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });
            // TODO: Draw enemies and score
        }

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
