<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flint Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <div class="header-brand">
        <img src="/images/Flint Logo 1.jpg" class="header-logo" alt="Flint">
        <div class="header-brand-text">
          <span class="logo">FLINT</span>
          <span class="header-subtitle">Your Friendly AI Agent OS</span>
        </div>
      </div>
      <span id="agent-count">0 agents</span>
      <button id="btn-projects" style="margin-left:12px;background:none;border:1px solid #30363d;color:#e6edf3;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:21px;">Projects</button>
    </div>
    <div class="header-right">
      <span id="today-cost">Today: $0.00</span>
      <span id="month-cost">Month: $0.00</span>
    </div>
  </header>

  <div id="toolbar">
    <button id="btn-new-agent">+ New Agent</button>
    <button id="btn-refresh">↻ Refresh</button>
    <button id="btn-workspaces">⚙ Workspaces</button>
    <button id="btn-mcp">⚡ MCP</button>
    <button id="btn-keys">🔑 Keys</button>
    <button id="btn-queue">⬡ Queue</button>
    <button id="btn-orchestrate">⬡ Orchestrate</button>
  </div>

  <div id="suggestions-strip" class="hidden"></div>
  <div id="panels"></div>
  <div id="project-view" class="hidden"></div>
  <div id="queue-view" class="hidden"></div>
  <div id="proj-toolbar" style="display:none"></div>

  <div id="modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <h2 id="modal-title">New Agent</h2>
      <label>
        Name
        <input id="modal-name" type="text" placeholder="research" autocomplete="off">
      </label>
      <label>
        Workspace
        <select id="modal-workspace">
          <option value="">— manual entry —</option>
        </select>
      </label>
      <label>
        Working Directory
        <input id="modal-workdir" type="text" placeholder="C:\Users\Robin\Applications Dev\Flint" autocomplete="off">
      </label>
      <label>
        Runtime
        <select id="modal-runtime">
          <option value="claude">Claude Code (claude)</option>
          <option value="vibe">Mistral Vibe (vibe)</option>
        </select>
      </label>
      <div class="form-group" id="modal-model-group">
        <label for="modal-model">Model (optional)</label>
        <select id="modal-model">
          <option value="">Default (agent config)</option>
        </select>
      </div>
      <div class="form-group" style="margin-top:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:16px">
          <input type="checkbox" id="modal-isolate">
          Isolated branch (safe self-modification)
        </label>
      </div>
      <div class="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-spawn">Spawn</button>
      </div>
    </div>
  </div>

  <div id="proj-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2>New Project</h2>
      <label>Name<input id="proj-modal-name" type="text" placeholder="My Project" autocomplete="off"></label>
      <label>Notes<textarea id="proj-modal-notes" rows="4" placeholder="Project context and goals…" style="width:100%;box-sizing:border-box;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:8px;font-family:inherit;resize:vertical"></textarea></label>
      <div class="modal-actions">
        <button id="proj-modal-cancel">Cancel</button>
        <button id="proj-modal-create">Create</button>
      </div>
    </div>
  </div>

  <div id="edit-proj-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:500px">
      <h2 id="edit-proj-title">Edit Project</h2>
      <input type="hidden" id="edit-proj-id">
      <label>Name<input id="edit-proj-name" type="text" autocomplete="off"></label>
      <label>Status
        <select id="edit-proj-status">
          <option value="active">active</option>
          <option value="paused">paused</option>
          <option value="done">done</option>
          <option value="archived">archived</option>
        </select>
      </label>
      <label>Notes<textarea id="edit-proj-notes" rows="5" style="width:100%;box-sizing:border-box;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:8px;font-family:inherit;resize:vertical"></textarea></label>
      <div>
        <h4 style="margin:12px 0 6px">Last Session Summary</h4>
        <pre id="edit-proj-summary" style="background:#161b22;padding:8px;border-radius:4px;font-size:13px;max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;color:#8b949e">(none)</pre>
      </div>
      <div>
        <h4 style="margin:12px 0 6px">Linked Agents</h4>
        <div id="edit-proj-agents"></div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <select id="edit-proj-agent-select" style="flex:1;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:4px"></select>
          <button id="edit-proj-link-btn">Link</button>
        </div>
      </div>
      <div class="modal-actions">
        <button id="edit-proj-cancel">Cancel</button>
        <button id="edit-proj-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Workspace manager modal -->
  <div id="ws-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:560px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">Workspaces</h2>
        <button id="ws-modal-close" style="background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer">✕</button>
      </div>
      <div id="ws-list" style="margin-bottom:16px;display:flex;flex-direction:column;gap:6px"></div>
      <div style="display:flex;gap:6px">
        <input id="ws-add-name" type="text" placeholder="Name (e.g. My App)" style="flex:1;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px">
        <input id="ws-add-path" type="text" placeholder="Path (e.g. C:\Projects\my-app)" style="flex:2;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px">
        <button id="ws-add-btn" style="background:#1f6feb;color:#fff;border:none;border-radius:4px;padding:6px 12px;cursor:pointer;font-size:16px">Add</button>
      </div>
    </div>
  </div>

  <!-- MCP Servers modal -->
  <div id="mcp-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:640px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">MCP Servers</h2>
        <button id="mcp-modal-close" style="background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer">✕</button>
      </div>
      <div id="mcp-list" style="margin-bottom:16px;min-height:32px"></div>
      <h4 style="color:#58a6ff;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Add Server</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
        <input id="mcp-add-name" type="text" placeholder="Name (e.g. filesystem)" style="background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px">
        <input id="mcp-add-command" type="text" placeholder="Command (e.g. npx)" style="background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px">
      </div>
      <input id="mcp-add-args" type="text" placeholder="Args space-separated (e.g. -y @modelcontextprotocol/server-filesystem /projects)" style="width:100%;box-sizing:border-box;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px;margin-bottom:6px">
      <textarea id="mcp-add-env" rows="2" placeholder="Env vars — KEY=VALUE one per line (optional)" style="width:100%;box-sizing:border-box;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px;margin-bottom:6px;resize:vertical;font-family:inherit"></textarea>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="mcp-add-scope" style="flex:1;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px">
          <option value="global">Global (all agents)</option>
        </select>
        <button id="mcp-add-btn" style="background:#1f6feb;color:#fff;border:none;border-radius:4px;padding:6px 14px;cursor:pointer;font-size:16px">Add</button>
      </div>
    </div>
  </div>

  <!-- Add Task modal -->
  <div id="add-task-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:480px">
      <h2>Add Task to Queue</h2>
      <label>Title (required)<input id="add-task-title" type="text" placeholder="Research OAuth2 patterns" autocomplete="off"></label>
      <label>Description<textarea id="add-task-desc" rows="3" placeholder="Optional detail…" style="width:100%;box-sizing:border-box;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:8px;font-family:inherit;resize:vertical"></textarea></label>
      <label>Assign to agent
        <select id="add-task-agent">
          <option value="">Leave unassigned</option>
        </select>
      </label>
      <label>Role
        <select id="add-task-role">
          <option value="">None</option>
          <option value="researcher">Researcher</option>
          <option value="planner">Planner</option>
          <option value="builder">Builder</option>
          <option value="tester">Tester</option>
        </select>
      </label>
      <label>Priority <input id="add-task-priority" type="number" value="0" min="0" style="width:80px"></label>
      <div class="modal-actions">
        <button id="add-task-cancel">Cancel</button>
        <button id="add-task-submit" style="background:#1f6feb;color:#fff;border:none">Add Task</button>
      </div>
    </div>
  </div>

  <!-- Orchestrate modal -->
  <div id="orch-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:480px">
      <h2>Orchestrate a Goal</h2>
      <label>Goal (required)
        <textarea id="orch-goal" rows="3" placeholder="Build a REST API with JWT auth and a React frontend…" style="width:100%;box-sizing:border-box;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:8px;font-family:inherit;resize:vertical"></textarea>
      </label>
      <label>
        Workspace
        <select id="orch-workspace">
          <option value="">— manual entry —</option>
        </select>
      </label>
      <label>Working Directory
        <input id="orch-workdir" type="text" placeholder="C:\Users\Robin\Applications Dev\Flint" autocomplete="off">
      </label>
      <label>Project (optional)
        <select id="orch-project">
          <option value="">None</option>
        </select>
      </label>
      <label>Model (optional)
        <select id="orch-model">
          <option value="">Default</option>
        </select>
      </label>
      <div class="modal-actions">
        <button id="orch-cancel">Cancel</button>
        <button id="orch-spawn" style="background:#6e40c9;color:#fff;border:none">Spawn Orchestrator</button>
      </div>
    </div>
  </div>

  <!-- API Keys modal -->
  <div id="keys-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:720px;width:95vw">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="margin:0">API Keys</h2>
        <button id="keys-modal-close" style="background:none;border:none;color:#8b949e;font-size:21px;cursor:pointer">✕</button>
      </div>
      <div id="keys-list" style="margin-bottom:20px;min-height:32px"></div>
      <h4 style="color:#58a6ff;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Add Provider</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
        <input id="keys-add-name" type="text" placeholder="Name slug (e.g. moonshot)" style="background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px;font-family:inherit">
        <input id="keys-add-label" type="text" placeholder="Display name (e.g. Moonshot Kimi)" style="background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px;font-family:inherit">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
        <input id="keys-add-env" type="text" placeholder="Env var (e.g. MOONSHOT_API_KEY)" style="background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px;font-family:inherit">
        <input id="keys-add-value" type="password" placeholder="API key (optional)" style="background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:16px;font-family:inherit">
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button id="keys-add-btn" style="background:#1f6feb;color:#fff;border:none;border-radius:4px;padding:6px 16px;cursor:pointer;font-size:16px">Add Provider</button>
      </div>
    </div>
  </div>

  <!-- Diff viewer modal -->
  <div id="diff-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:900px;width:95vw">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0" id="diff-modal-title">Branch diff</h2>
        <button id="diff-modal-close" style="background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer">✕</button>
      </div>
      <pre id="diff-stat" style="background:#161b22;padding:8px;border-radius:4px;font-size:13px;color:#8b949e;margin-bottom:8px;white-space:pre-wrap"></pre>
      <pre id="diff-content" style="background:#0d1117;padding:12px;border-radius:4px;font-size:13px;max-height:60vh;overflow-y:auto;white-space:pre;overflow-x:auto;border:1px solid #30363d"></pre>
    </div>
  </div>

  <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
